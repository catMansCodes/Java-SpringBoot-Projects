spring.application.name=user-apis
server.port=8080
# Profiles (set active profile for local/dev)
spring.profiles.active=dev
# Server context path (optional)
# server.servlet.context-path=/api

#MYSQL Configurations
spring.datasource.url=jdbc:mysql://localhost:3306/user?useSSL=false&serverTimezone=UTC
spring.datasource.password=root
spring.datasource.username=root
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000

#JPA Configurations
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=false

# Actuator (if you include spring-boot-starter-actuator)
#management.endpoints.web.exposure.include=health,info,metrics,loggers
#management.endpoint.health.show-details=when_authorized

# Logger setup
logging.level.root=INFO
logging.level.com.catmanscodes.userapis=DEBUG
spring.application.name=todo-apis
server.port=8080
spring.profiles.active=dev

# Server context path (optional)
# server.servlet.context-path=/api

# Database & JPA Configurations
spring.datasource.url=jdbc:mysql://localhost:3306/todo_app
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000

#JPA Configurations
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=false

#Security Configuration
#spring.security.user.name=root
#spring.security.user.password=root
#spring.security.user.roles= ADMIN, USER, MANAGER

# catman , 24hr expiration time
app.jwt-secret=a3896cfd1afca32bd25c7d030d5d604c6bdb56bc8327319cacf0c55cdaf20fb5
app.jwt-expiration-milliseconds=86000000

# Actuator (if include spring-boot-starter-actuator)
#management.endpoints.web.exposure.include=health,info,metrics,loggers
#management.endpoint.health.show-details=when_authorized

# Logger setup
logging.level.root=INFO
logging.level.com.catmanscodes.todoapis=DEBUG

